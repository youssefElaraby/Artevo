  http: ^1.6.0
  firebase_messaging: ^16.1.3
  flutter_local_notifications: ^21.0.0
  font_awesome_flutter: ^11.0.0
  connectivity_plus: ^7.1.1
  firebase_crashlytics: ^5.2.0



dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/image/
    - assets/image/wave.json
    - assets/image/Google.svg

flutter_icons:
  android: true
  ios: true
  image_path: "assets/image/logo.png" 
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/image/logo.png"
