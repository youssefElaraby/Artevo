    sdk: flutter
  google_fonts: ^6.3.3
  flutter_svg: ^2.2.3
  animate_do: ^4.2.0
  flutter_screenutil: ^5.9.3
  url_launcher: ^6.3.2
  animations: ^2.1.1
  flutter_bloc: ^9.1.1
  firebase_auth: ^6.1.3
  firebase_core: ^4.3.0
  cloud_firestore: ^6.1.1
  shared_preferences: ^2.5.4
  carousel_slider: ^5.1.1
  lottie: ^2.7.0
  image_picker: ^1.2.1
  fluttertoast: ^8.2.1
  flutter_launcher_icons: ^0.14.4
  cupertino_icons: ^1.0.8
  firebase_storage: ^13.0.5
  cloudinary_public: ^0.23.1
  intl: ^0.20.2
  hive_flutter: ^1.1.0
  cached_network_image: ^3.4.1
  shimmer_animation: ^2.2.2+1
  story_view: ^0.16.6
  video_player: ^2.11.0
  flutter_story_presenter: ^1.0.7
  google_sign_in: ^6.2.1
  flutter_tilt: ^3.3.2
  flutter_staggered_grid_view: ^0.7.0
